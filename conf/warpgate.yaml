# yaml-language-server: $schema=https://raw.githubusercontent.com/warp-tech/warpgate/refs/heads/main/config-schema.json

sso_providers: []
recordings:
  enable: __RECORDINGS_ENABLE__
  path: __DATA_DIR__/recordings
external_host: __DOMAIN__
database_url: postgres://__DB_USER__:__DB_PWD__@127.0.0.1:5432/__DB_NAME__
ssh:
  enable: __SSH_ENABLE__
  listen: '[::]:__PORT_SSH__'
  external_port: null
