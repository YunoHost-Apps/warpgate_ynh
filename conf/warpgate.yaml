  keepalive_interval: null
http:
  listen: '[::]:__PORT__'
  external_port: null
  certificate: __DATA_DIR__/tls.certificate.pem
  key: __DATA_DIR__/tls.key.pem
  trust_x_forwarded_headers: false
  session_max_age: 30m
  cookie_max_age: 1day
  sni_certificates: []
mysql:
  enable: __MYSQL_ENABLE__
  listen: '[::]:__PORT_MYSQL__'
  external_port: null
  certificate: __DATA_DIR__/tls.certificate.pem
  key: __DATA_DIR__/tls.key.pem
postgres:
  enable: __POSTGRES_ENABLE__
  listen: '[::]:__PORT_POSTGRES__'
  external_port: null
  certificate: __DATA_DIR__/tls.certificate.pem
  key: __DATA_DIR__/tls.key.pem
log:
  retention: 7days
  send_to: null
